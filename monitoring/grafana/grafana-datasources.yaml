# Grafana Data Source Configuration
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: taxi-fare-prod
data:
  prometheus.yaml: |
    apiVersion: 1
    datasources:
    - name: Prometheus
      type: prometheus
      access: proxy
      orgId: 1
      url: http://prometheus:9090
      password:
      user:
      database:
      basicAuth: false
      isDefault: true
      jsonData:
        timeInterval: 30s
      editable: true
    
    - name: Loki
      type: loki
      access: proxy
      orgId: 1
      url: http://loki:3100
      password:
      user:
      database:
      basicAuth: false
      isDefault: false
      jsonData:
        maxLines: 1000
      editable: true
    
    - name: Jaeger
      type: jaeger
      access: proxy
      orgId: 1
      url: http://jaeger-query:16686
      password:
      user:
      database:
      basicAuth: false
      isDefault: false
      editable: true

  dashboards.yaml: |
    apiVersion: 1
    providers:
    - name: dashboards
      orgId: 1
      folder: Dashboards
      type: file
      disableDeletion: false
      updateIntervalSeconds: 10
      allowUiUpdates: true
      options:
        path: /var/lib/grafana/dashboards
