global:
  scrape_interval: 30s
  scrape_timeout: 10s
  evaluation_interval: 30s
  external_labels:
    environment: production
    cluster: taxi-fare-prod
    job: prometheus

# Alertmanager configuration
alerting:
  alertmanagers:
  - static_configs:
    - targets:
      - localhost:9093
    - alertmanager:9093

# Load rules
rule_files:
- /etc/prometheus/rules/alert_rules.yml
- /etc/prometheus/rules/recording_rules.yml

# Scrape configurations
scrape_configs:

# Prometheus itself
- job_name: prometheus
  static_configs:
  - targets: ['localhost:9090']

# Taxi Fare API (Kubernetes service discovery)
- job_name: taxi-fare-api
  kubernetes_sd_configs:
  - role: pod
    namespaces:
      names:
      - taxi-fare-prod
  relabel_configs:
  - source_labels: [__meta_kubernetes_pod_label_app]
    action: keep
    regex: taxi-fare-api
  - source_labels: [__meta_kubernetes_pod_container_port_name]
    action: keep
    regex: metrics
  - source_labels: [__meta_kubernetes_namespace]
    target_label: namespace
  - source_labels: [__meta_kubernetes_pod_name]
    target_label: pod
  scrape_interval: 30s
  metrics_path: /metrics
  scheme: http

# MLflow Service
- job_name: mlflow
  kubernetes_sd_configs:
  - role: pod
    namespaces:
      names:
      - taxi-fare-prod
  relabel_configs:
  - source_labels: [__meta_kubernetes_pod_label_app]
    action: keep
    regex: mlflow-service
  - source_labels: [__meta_kubernetes_namespace]
    target_label: namespace
  - source_labels: [__meta_kubernetes_pod_name]
    target_label: pod
  scrape_interval: 60s
  metrics_path: /metrics

# Node Exporter (host metrics)
- job_name: node-exporter
  kubernetes_sd_configs:
  - role: endpoints
    namespaces:
      names:
      - kube-system
      - taxi-fare-prod
  relabel_configs:
  - source_labels: [__meta_kubernetes_endpoints_name]
    action: keep
    regex: node-exporter
  - source_labels: [__meta_kubernetes_endpoint_port_name]
    action: keep
    regex: metrics
  scrape_interval: 30s

# Kubernetes API server
- job_name: kubernetes-apiservers
  kubernetes_sd_configs:
  - role: endpoints
  scheme: https
  tls_config:
    ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
  bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
  relabel_configs:
  - source_labels: [__meta_kubernetes_namespace, __meta_kubernetes_service_name, __meta_kubernetes_endpoint_port_name]
    action: keep
    regex: default;kubernetes;https

# Kubernetes Nodes
- job_name: kubernetes-nodes
  kubernetes_sd_configs:
  - role: node
  scheme: https
  tls_config:
    ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
  bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
  relabel_configs:
  - action: labelmap
    regex: __meta_kubernetes_node_label_(.+)
  - target_label: __address__
    replacement: kubernetes.default.svc:443
  - source_labels: [__meta_kubernetes_node_name]
    regex: (.+)
    target_label: __metrics_path__
    replacement: /api/v1/nodes/${1}/proxy/metrics

# Kubernetes Pods
- job_name: kubernetes-pods
  kubernetes_sd_configs:
  - role: pod
  relabel_configs:
  - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
    action: keep
    regex: "true"
  - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
    action: replace
    target_label: __metrics_path__
    regex: (.+)
  - source_labels: [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
    action: replace
    regex: ([^:]+)(?::\d+)?;(\d+)
    replacement: $1:$2
    target_label: __address__
  - action: labelmap
    regex: __meta_kubernetes_pod_label_(.+)
  - source_labels: [__meta_kubernetes_namespace]
    action: replace
    target_label: kubernetes_namespace
  - source_labels: [__meta_kubernetes_pod_name]
    action: replace
    target_label: kubernetes_pod_name

# Docker containers (if using Docker)
- job_name: docker
  static_configs:
  - targets: ['localhost:9323']
  scrape_interval: 15s

# Custom application metrics
- job_name: taxi-fare-custom
  static_configs:
  - targets: ['localhost:8001']
  relabel_configs:
  - target_label: service
    replacement: taxi-fare-api
  scrape_interval: 30s

# Blackbox exporter for HTTP checks
- job_name: blackbox
  metrics_path: /probe
  static_configs:
  - targets:
    - http://localhost:8000/health
    - http://localhost:8000/predict
    - http://localhost:5000
  relabel_configs:
  - source_labels: [__address__]
    target_label: __param_target
  - source_labels: [__param_target]
    target_label: instance
  - target_label: __address__
    replacement: localhost:9115
  scrape_interval: 30s
