# Elasticsearch deployment for ELK stack

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: elasticsearch-config
  namespace: taxi-fare-prod
data:
  elasticsearch.yml: |
    cluster.name: taxi-fare-logging
    node.name: ${HOSTNAME}
    
    network.host: 0.0.0.0
    http.port: 9200
    
    discovery.type: single-node
    
    path.data: /usr/share/elasticsearch/data
    path.logs: /usr/share/elasticsearch/logs
    
    xpack.security.enabled: false
    xpack.monitoring.enabled: true

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: elasticsearch-pvc
  namespace: taxi-fare-prod
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 30Gi
  storageClassName: standard

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: elasticsearch
  namespace: taxi-fare-prod
  labels:
    app: elasticsearch
spec:
  replicas: 1
  selector:
    matchLabels:
      app: elasticsearch
  template:
    metadata:
      labels:
        app: elasticsearch
    spec:
      containers:
      - name: elasticsearch
        image: docker.elastic.co/elasticsearch/elasticsearch:8.0.0
        imagePullPolicy: IfNotPresent
        
        ports:
        - containerPort: 9200
          name: http
        - containerPort: 9300
          name: transport
        
        env:
        - name: discovery.type
          value: single-node
        - name: ES_JAVA_OPTS
          value: "-Xms512m -Xmx512m"
        - name: xpack.security.enabled
          value: "false"
        
        resources:
          requests:
            cpu: 500m
            memory: 512Mi
          limits:
            cpu: 1000m
            memory: 1Gi
        
        livenessProbe:
          httpGet:
            path: /_cluster/health
            port: 9200
          initialDelaySeconds: 30
          periodSeconds: 10
        
        readinessProbe:
          httpGet:
            path: /_cluster/health
            port: 9200
          initialDelaySeconds: 10
          periodSeconds: 5
        
        volumeMounts:
        - name: data
          mountPath: /usr/share/elasticsearch/data
        - name: config
          mountPath: /usr/share/elasticsearch/config/elasticsearch.yml
          subPath: elasticsearch.yml
          readOnly: true
      
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: elasticsearch-pvc
      - name: config
        configMap:
          name: elasticsearch-config

---
apiVersion: v1
kind: Service
metadata:
  name: elasticsearch
  namespace: taxi-fare-prod
  labels:
    app: elasticsearch
spec:
  type: ClusterIP
  selector:
    app: elasticsearch
  ports:
  - name: http
    port: 9200
    targetPort: 9200
  - name: transport
    port: 9300
    targetPort: 9300

---
# Logstash deployment for log processing

apiVersion: v1
kind: ConfigMap
metadata:
  name: logstash-config
  namespace: taxi-fare-prod
data:
  logstash.yml: |
    http.host: 0.0.0.0
    http.port: 9600

  logstash.conf: |
    input {
      tcp {
        port => 5000
        codec => json
      }
      
      udp {
        port => 5000
        codec => json
      }
      
      beats {
        port => 5044
      }
    }
    
    filter {
      if [type] == "taxi-fare-api" {
        grok {
          match => { "message" => "%{TIMESTAMP_ISO8601:timestamp} \[%{LOGLEVEL:level}\] %{DATA:logger}: %{GREEDYDATA:msg}" }
        }
        
        if "_grokparsefailure" in [tags] {
          drop { }
        }
      }
      
      if [level] == "ERROR" or [level] == "CRITICAL" {
        mutate {
          add_field => { "alert" => true }
        }
      }
    }
    
    output {
      elasticsearch {
        hosts => ["elasticsearch:9200"]
        index => "logs-%{+YYYY.MM.dd}"
      }
      
      if [alert] {
        email {
          to => "alerts@taxi-fare.example.com"
          subject => "Alert: %{level} - %{logger}"
          body => "%{msg}"
        }
      }
    }

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: logstash
  namespace: taxi-fare-prod
  labels:
    app: logstash
spec:
  replicas: 1
  selector:
    matchLabels:
      app: logstash
  template:
    metadata:
      labels:
        app: logstash
    spec:
      containers:
      - name: logstash
        image: docker.elastic.co/logstash/logstash:8.0.0
        imagePullPolicy: IfNotPresent
        
        ports:
        - containerPort: 5000
          name: input-tcp
        - containerPort: 5044
          name: input-beats
        - containerPort: 9600
          name: http
        
        env:
        - name: LS_JAVA_OPTS
          value: "-Xmx256m -Xms256m"
        
        resources:
          requests:
            cpu: 250m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 512Mi
        
        livenessProbe:
          httpGet:
            path: /
            port: 9600
          initialDelaySeconds: 60
          periodSeconds: 10
        
        readinessProbe:
          httpGet:
            path: /
            port: 9600
          initialDelaySeconds: 30
          periodSeconds: 5
        
        volumeMounts:
        - name: config
          mountPath: /usr/share/logstash/config
          readOnly: true
        - name: pipeline
          mountPath: /usr/share/logstash/pipeline
          readOnly: true
      
      volumes:
      - name: config
        configMap:
          name: logstash-config
          items:
          - key: logstash.yml
            path: logstash.yml
      - name: pipeline
        configMap:
          name: logstash-config
          items:
          - key: logstash.conf
            path: logstash.conf

---
apiVersion: v1
kind: Service
metadata:
  name: logstash
  namespace: taxi-fare-prod
  labels:
    app: logstash
spec:
  type: ClusterIP
  selector:
    app: logstash
  ports:
  - name: input-tcp
    port: 5000
    targetPort: 5000
  - name: input-beats
    port: 5044
    targetPort: 5044

---
# Kibana deployment

apiVersion: apps/v1
kind: Deployment
metadata:
  name: kibana
  namespace: taxi-fare-prod
  labels:
    app: kibana
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kibana
  template:
    metadata:
      labels:
        app: kibana
    spec:
      containers:
      - name: kibana
        image: docker.elastic.co/kibana/kibana:8.0.0
        imagePullPolicy: IfNotPresent
        
        ports:
        - containerPort: 5601
          name: http
        
        env:
        - name: ELASTICSEARCH_HOSTS
          value: "http://elasticsearch:9200"
        - name: ELASTICSEARCH_USERNAME
          value: "elastic"
        - name: KIBANA_DEFAULTAPPID
          value: "discover"
        
        resources:
          requests:
            cpu: 250m
            memory: 512Mi
          limits:
            cpu: 500m
            memory: 1Gi
        
        livenessProbe:
          httpGet:
            path: /app/kibana
            port: 5601
          initialDelaySeconds: 30
          periodSeconds: 10
        
        readinessProbe:
          httpGet:
            path: /app/kibana
            port: 5601
          initialDelaySeconds: 10
          periodSeconds: 5

---
apiVersion: v1
kind: Service
metadata:
  name: kibana
  namespace: taxi-fare-prod
  labels:
    app: kibana
spec:
  type: ClusterIP
  selector:
    app: kibana
  ports:
  - name: http
    port: 5601
    targetPort: 5601

---
# Kibana Ingress
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: kibana-ingress
  namespace: taxi-fare-prod
spec:
  ingressClassName: nginx
  rules:
  - host: logs.taxi-fare.example.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: kibana
            port:
              number: 5601
