# Prometheus Alert Rules for Model Monitoring & Drift Detection
# Day 13: Advanced Monitoring & Drift Detection

groups:
  - name: model_performance.rules
    interval: 30s
    rules:
      - alert: HighPredictionLatency
        expr: histogram_quantile(0.95, rate(model_inference_duration_seconds_bucket[5m])) > 1.0
        for: 5m
        labels:
          severity: warning
          component: model
        annotations:
          summary: "High prediction latency detected"
          description: "P95 latency is {{ $value }}s, exceeds 1.0s threshold on {{ $labels.model_name }}"

      - alert: ModelAccuracyDegradation
        expr: rate(model_predictions_total{status="incorrect"}[5m]) / rate(model_predictions_total[5m]) > 0.15
        for: 10m
        labels:
          severity: critical
          component: model
        annotations:
          summary: "Model accuracy degradation"
          description: "Error rate is {{ $value | humanizePercentage }} on {{ $labels.model_name }}"

      - alert: HighErrorRate
        expr: rate(model_predictions_total{status="error"}[5m]) > 0.01
        for: 5m
        labels:
          severity: warning
          component: model
        annotations:
          summary: "High model prediction error rate"
          description: "Error rate is {{ $value | humanizePercentage }}"

  - name: data_quality.rules
    interval: 30s
    rules:
      - alert: DataDriftDetected
        expr: data_drift_score > 0.5
        for: 5m
        labels:
          severity: warning
          component: data_quality
        annotations:
          summary: "Data drift detected"
          description: "Feature {{ $labels.feature }} has drift score {{ $value }}, threshold is 0.5"

      - alert: DataValidationFailure
        expr: increase(data_validation_failures_total[5m]) > 100
        for: 5m
        labels:
          severity: critical
          component: data_quality
        annotations:
          summary: "High data validation failures"
          description: "{{ $value }} validation failures in last 5 minutes for {{ $labels.validation_type }}"

      - alert: MissingValuesExceeded
        expr: data_quality_missing_values_ratio > 0.1
        for: 10m
        labels:
          severity: warning
          component: data_quality
        annotations:
          summary: "Missing values exceed threshold"
          description: "{{ $labels.feature }} has {{ $value | humanizePercentage }} missing values"

      - alert: OutliersDetected
        expr: data_quality_outlier_ratio > 0.05
        for: 5m
        labels:
          severity: warning
          component: data_quality
        annotations:
          summary: "Unusual outlier ratio detected"
          description: "{{ $labels.feature }} has {{ $value | humanizePercentage }} outliers"

  - name: api.rules
    interval: 30s
    rules:
      - alert: HighAPILatency
        expr: histogram_quantile(0.99, rate(api_request_duration_seconds_bucket[5m])) > 2.0
        for: 5m
        labels:
          severity: warning
          component: api
        annotations:
          summary: "High API latency"
          description: "P99 latency is {{ $value }}s on endpoint {{ $labels.endpoint }}"

      - alert: APIErrorRateHigh
        expr: rate(api_requests_total{status=~"5.."}[5m]) / rate(api_requests_total[5m]) > 0.05
        for: 5m
        labels:
          severity: critical
          component: api
        annotations:
          summary: "High API error rate"
          description: "Error rate is {{ $value | humanizePercentage }} on endpoint {{ $labels.endpoint }}"

  - name: infrastructure.rules
    interval: 30s
    rules:
      - alert: PrometheusDown
        expr: up{job="prometheus"} == 0
        for: 1m
        labels:
          severity: critical
          component: infrastructure
        annotations:
          summary: "Prometheus is down"
          description: "Prometheus instance at {{ $labels.instance }} has been down for 1 minute"

      - alert: ServiceDown
        expr: up{job!="prometheus"} == 0
        for: 2m
        labels:
          severity: critical
          component: infrastructure
        annotations:
          summary: "Service is down"
          description: "{{ $labels.job }} at {{ $labels.instance }} is down"
