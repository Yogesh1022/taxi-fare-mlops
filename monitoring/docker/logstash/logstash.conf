# Logstash Configuration

input {
  tcp {
    port => 5000
    codec => json
  }
  
  udp {
    port => 5000
    codec => json
  }
  
  beats {
    port => 5044
  }
}

filter {
  # Parse taxi-fare-api logs
  if [type] == "taxi-fare-api" or [source] =~ /taxi-fare/ {
    grok {
      match => { "message" => "%{TIMESTAMP_ISO8601:timestamp} \[%{LOGLEVEL:level}\] %{DATA:logger}: %{GREEDYDATA:msg}" }
      tag_on_failure => []
    }
    
    # Add metadata
    mutate {
      add_field => { "app" => "taxi-fare" }
      add_field => { "environment" => "${ENVIRONMENT:dev}" }
    }
  }
  
  # Mark errors for alerting
  if [level] == "ERROR" or [level] == "CRITICAL" {
    mutate {
      add_field => { "alert" => true }
      add_field => { "severity" => "high" }
    }
  } else if [level] == "WARNING" {
    mutate {
      add_field => { "severity" => "medium" }
    }
  } else {
    mutate {
      add_field => { "severity" => "low" }
    }
  }
  
  # Add timestamp if not present
  if ![timestamp] {
    mutate {
      add_field => { "timestamp" => "%{@timestamp}" }
    }
  }
  
  # Remove empty fields
  if [msg] == "" {
    mutate {
      remove_field => [ "msg" ]
    }
  }
}

output {
  # Send to Elasticsearch
  elasticsearch {
    hosts => ["${ELASTICSEARCH_HOST:elasticsearch:9200}"]
    index => "logs-%{app}-%{+YYYY.MM.dd}"
    template => true
    template_name => "logs"
  }
  
  # Alert on errors
  if [alert] {
    email {
      to => "${ALERT_EMAIL:alerts@taxi-fare.local}"
      subject => "[%{severity}] %{level} in %{app}: %{logger}"
      body => "Message: %{msg}\n\nTimestamp: %{timestamp}\n\nFull message:\n%{message}"
    }
  }
  
  # Debug output
  stdout {
    codec => rubydebug
  }
}
