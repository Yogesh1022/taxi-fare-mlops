# Jaeger Configuration for Distributed Tracing
# Jaeger all-in-one deployment with multiple backends support

apiVersion: v1
kind: ConfigMap
metadata:
  name: jaeger-configuration
  namespace: taxi-fare-prod
data:
  sampling.json: |
    {
      "default_strategy": {
        "type": "probabilistic",
        "param": 1.0
      },
      "service_strategies": [
        {
          "service": "taxi-fare-api",
          "type": "probabilistic",
          "param": 1.0
        },
        {
          "service": "mlflow",
          "type": "probabilistic",
          "param": 0.5
        }
      ]
    }

  collector-config.yaml: |
    collector:
      port: 14269
      admin_port: 14269
      grpc:
        enabled: true
        host_port: 0.0.0.0:14250
      http_server:
        host_port: 0.0.0.0:14268
    
    queues:
      memory:
        max_spans: 100000

    processors:
      batch:
        timeout: 1s
        send_batch_size: 1024

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: jaeger-ui-config
  namespace: taxi-fare-prod
data:
  ui.json: |
    {
      "menu": [
        {
          "label": "About Jaeger",
          "items": [
            {
              "label": "GitHub",
              "url": "https://github.com/jaegertracing/jaeger"
            }
          ]
        }
      ],
      "tracking": {
        "gaID": ""
      }
    }

---
# Jaeger all-in-one deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: jaeger
  namespace: taxi-fare-prod
  labels:
    app: jaeger
spec:
  replicas: 1
  selector:
    matchLabels:
      app: jaeger
  template:
    metadata:
      labels:
        app: jaeger
    spec:
      containers:
      - name: jaeger
        image: jaegertracing/all-in-one:latest
        imagePullPolicy: IfNotPresent
        
        ports:
        - containerPort: 5775
          protocol: UDP
          name: udp-zipkin-compact
        - containerPort: 5778
          protocol: TCP
          name: serve-configs
        - containerPort: 6831
          protocol: UDP
          name: udp-jaeger-compact
        - containerPort: 6832
          protocol: UDP
          name: udp-jaeger-binary
        - containerPort: 14268
          protocol: TCP
          name: http-collector
        - containerPort: 14250
          protocol: TCP
          name: grpc-collector
        - containerPort: 16686
          protocol: TCP
          name: http-query
        - containerPort: 14269
          protocol: TCP
          name: admin-port
        
        env:
        - name: COLLECTOR_ZIPKIN_HOST_PORT
          value: "0.0.0.0:9411"
        - name: COLLECTOR_OTLP_ENABLED
          value: "true"
        - name: REMOTE_STORAGE_TYPE
          value: "elasticsearch"
        - name: ES_SERVER_URLS
          value: "http://elasticsearch:9200"
        - name: MEMORY_MAX_TRACES
          value: "10000"
        - name: SAMPLING_STRATEGIES_FILE
          value: "/etc/jaeger/sampling.json"
        - name: QUERY_UI_CONFIG
          value: "/etc/jaeger/ui.json"
        
        resources:
          requests:
            cpu: 500m
            memory: 512Mi
          limits:
            cpu: 1000m
            memory: 1Gi
        
        livenessProbe:
          httpGet:
            path: /
            port: 16686
          initialDelaySeconds: 30
          periodSeconds: 10
        
        readinessProbe:
          httpGet:
            path: /
            port: 16686
          initialDelaySeconds: 10
          periodSeconds: 5
        
        volumeMounts:
        - name: jaeger-config
          mountPath: /etc/jaeger
          readOnly: true
      
      volumes:
      - name: jaeger-config
        configMap:
          name: jaeger-configuration

---
# Jaeger services
apiVersion: v1
kind: Service
metadata:
  name: jaeger-query
  namespace: taxi-fare-prod
  labels:
    app: jaeger
spec:
  type: ClusterIP
  selector:
    app: jaeger
  ports:
  - name: query
    port: 16686
    targetPort: 16686

---
apiVersion: v1
kind: Service
metadata:
  name: jaeger-collector
  namespace: taxi-fare-prod
  labels:
    app: jaeger
spec:
  type: ClusterIP
  selector:
    app: jaeger
  ports:
  - name: otlp-grpc
    port: 4317
    targetPort: 4317
  - name: http-collector
    port: 14268
    targetPort: 14268
  - name: zipkin-compact
    port: 5775
    targetPort: 5775
    protocol: UDP
  - name: jaeger-compact
    port: 6831
    targetPort: 6831
    protocol: UDP
  - name: jaeger-binary
    port: 6832
    targetPort: 6832
    protocol: UDP

---
# Jaeger Ingress
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: jaeger-ingress
  namespace: taxi-fare-prod
spec:
  ingressClassName: nginx
  rules:
  - host: tracing.taxi-fare.example.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: jaeger-query
            port:
              number: 16686
