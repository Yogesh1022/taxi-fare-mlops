stages:
  clean:
    cmd: python -m src.data.clean
    deps:
    - data/raw/train.csv
    - data/raw/test.csv
    - src/data/clean.py
    outs:
    - data/clean/train_clean.csv
    - data/clean/test_clean.csv

  ingest:
    cmd: python -m src.data.ingest
    deps:
    - data/clean/train_clean.csv
    - data/clean/test_clean.csv
    outs:
    - data/processed/ingested_train.csv
    - data/processed/ingested_test.csv

  validate:
    cmd: python src/data/validate_run.py
    deps:
    - data/raw/train.csv
    - data/raw/test.csv
    - src/data/validate_run.py
    metrics:
    - mlops/data_quality/validation_metrics.json:
        cache: false
  train:
    cmd: python -m pipelines.training_pipeline
    deps:
    - data/processed/ingested_train.csv
    - pipelines/training_pipeline.py
    outs:
    - models/model.pkl
    metrics:
    - models/metrics.json:
        cache: false

  baseline:
    cmd: python -m src.models.baseline
    deps:
    - data/processed/ingested_train.csv
    - src/models/baseline.py
    - src/models/train.py
    - models/preprocessor.pkl
    outs:
    - models/best_baseline_model.pkl
    metrics:
    - models/leaderboard.json:
        cache: false
    - models/baseline_summary.json:
        cache: false

  tune:
    cmd: python -m pipelines.tuning_pipeline
    deps:
    - data/processed/ingested_train.csv
    - pipelines/tuning_pipeline.py
    - src/models/tune.py
    - models/preprocessor.pkl
    outs:
    - models/tuned_svm_model.pkl
    - models/tuned_xgboost_model.pkl
    - models/tuned_lightgbm_model.pkl
    metrics:
    - models/tuned_best_params.json:
        cache: false
    - models/tuning_results.json:
        cache: false
    - models/tuning_comparison.json:
        cache: false
