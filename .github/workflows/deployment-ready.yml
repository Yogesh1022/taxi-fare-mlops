name: Deployment Readiness

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - 'src/**'
      - 'docker/**'
  schedule:
    - cron: '0 4 * * *'  # Daily at 4 AM UTC

env:
  PYTHON_VERSION: '3.10'

jobs:
  deployment-checks:
    name: Pre-Deployment Validation
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Verify all tests pass
      run: |
        pytest tests/ -q --tb=line
        echo "✅ All tests passed ($?)"

    - name: Check Python version compatibility
      run: |
        python --version
        python -c "import sys; assert sys.version_info >= (3, 10), 'Python 3.10+ required'"

    - name: Verify core modules importable
      run: |
        python -c "
        print('Checking core modules...')
        
        modules = [
            'src.data.ingest',
            'src.data.validate',
            'src.features.pipeline',
            'src.models.train',
            'src.models.predict',
            'src.deployment.batch_predictions',
            'src.deployment.inference_api',
        ]
        
        for mod in modules:
            try:
                __import__(mod)
                print(f'✅ {mod}')
            except ImportError as e:
                print(f'❌ {mod}: {e}')
                raise
        "

    - name: Check configuration files
      run: |
        python -c "
        import os
        import yaml
        
        config_files = [
            'params.yaml',
            'pyproject.toml',
            'dvc.yaml',
        ]
        
        for cfg in config_files:
            if os.path.exists(cfg):
                print(f'✅ {cfg} exists')
            else:
                print(f'⚠️ {cfg} missing')
        "

    - name: List all test files
      run: |
        find tests -name "test_*.py" -type f | sort
        echo "---"
        echo "Total test files: $(find tests -name 'test_*.py' -type f | wc -l)"

  docker-build-check:
    name: Docker Build Check
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

    - name: Verify Dockerfile exists
      run: |
        if [ -f "docker/Dockerfile" ]; then
          echo "✅ Dockerfile found"
          echo "---"
          head -20 docker/Dockerfile
        else
          echo "❌ Dockerfile not found"
          exit 1
        fi

    - name: Verify docker-compose exists
      run: |
        if [ -f "docker/docker-compose.yml" ]; then
          echo "✅ docker-compose.yml found"
        else
          echo "ℹ️ docker-compose.yml not found"
        fi

  artifact-check:
    name: Check Required Artifacts
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4

    - name: Check data directories
      run: |
        echo "Checking data structure..."
        for dir in data/raw data/processed data/interim; do
          if [ -d "$dir" ]; then
            count=$(find "$dir" -type f | wc -l)
            echo "✅ $dir ($count files)"
          else
            echo "⚠️ $dir missing"
          fi
        done

    - name: Check models directory
      run: |
        if [ -d "models" ]; then
          count=$(find models -type f | wc -l)
          echo "✅ models directory ($count files)"
        else
          echo "⚠️ models directory missing"
        fi

    - name: Check logs directory
      run: |
        if [ -d "logs" ]; then
          echo "✅ logs directory exists"
        else
          echo "ℹ️ logs directory will be created at runtime"
        fi

    - name: Check configuration
      run: |
        if [ -f "mlops/mlflow/config.yaml" ]; then
          echo "✅ MLflow config exists"
        fi
        
        if [ -f "mlops/monitoring/config.yaml" ]; then
          echo "✅ Monitoring config exists"
        fi

  code-coverage:
    name: Code Coverage Analysis
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-cov

    - name: Generate coverage report
      run: |
        pytest tests/ --cov=src --cov-report=term-missing:skip-covered --cov-report=json

    - name: Check coverage threshold
      run: |
        python -c "
        import json
        
        with open('coverage.json') as f:
            data = json.load(f)
        
        total_coverage = data['totals']['percent_covered']
        print(f'Overall Coverage: {total_coverage:.1f}%')
        
        if total_coverage >= 80:
            print('✅ Coverage target met (≥80%)')
        elif total_coverage >= 60:
            print(f'⚠️ Coverage below target ({total_coverage:.1f}% < 80%)')
        else:
            print(f'❌ Coverage critically low ({total_coverage:.1f}%)')
        "
      continue-on-error: true

  deployment-summary:
    name: Deployment Summary
    runs-on: ubuntu-latest
    needs: [deployment-checks, docker-build-check, artifact-check, code-coverage]
    if: always()
    
    steps:
    - name: Print deployment status
      run: |
        echo "═══════════════════════════════════════"
        echo "DEPLOYMENT READINESS REPORT"
        echo "═══════════════════════════════════════"
        echo "✅ Pre-Deployment Checks: ${{ needs.deployment-checks.result }}"
        echo "✅ Docker Build: ${{ needs.docker-build-check.result }}"
        echo "✅ Artifacts: ${{ needs.artifact-check.result }}"
        echo "✅ Code Coverage: ${{ needs.code-coverage.result }}"
        echo "═══════════════════════════════════════"
        
        if [ "${{ needs.deployment-checks.result }}" == "failure" ]; then
          echo "❌ Deployment blocked: Pre-deployment checks failed"
          exit 1
        fi
        
        echo "✅ READY FOR DEPLOYMENT"
