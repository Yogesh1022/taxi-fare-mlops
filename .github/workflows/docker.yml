name: Docker Build & Push

on:
  push:
    branches: [ main ]
    paths:
      - 'docker/**'
      - 'src/**'
      - '.github/workflows/docker.yml'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Docker image tag (default: latest)'
        required: false
        default: 'latest'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/taxi-fare-api

jobs:
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Login to GitHub Container Registry
      uses: docker/login-action@v2
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@v4
      with:
        images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
        tags: |
          type=ref,event=branch
          type=semver,pattern={{version}}
          type=semver,pattern={{major}}.{{minor}}
          type=sha,prefix=sha-
          type=raw,value=${{ github.event.inputs.tag }},enable=${{ github.event_name == 'workflow_dispatch' }}

    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./docker/Dockerfile
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Generate SBOM (Software Bill of Materials)
      uses: anchore/sbom-action@v0
      with:
        image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
        format: spdx-json
        output-file: sbom-spdx.json

    - name: Upload SBOM as artifact
      uses: actions/upload-artifact@v4
      with:
        name: docker-sbom
        path: sbom-spdx.json
        retention-days: 30

    - name: Report image pushed
      uses: actions/github-script@v7.0.1
      with:
        github-token: ${{ secrets.GITHUB_TOKEN }}
        script: |
          github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: `✅ Docker image pushed to registry!
          
          **Image Details:**
          - Registry: ${{ env.REGISTRY }}
          - Repository: ${{ env.IMAGE_NAME }}
          - Tags: ${{ steps.meta.outputs.tags }}
          - Timestamp: ${new Date().toISOString()}
          
          **Pull command:**
          \`\`\`bash
          docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          \`\`\``
          })
      if: github.event_name == 'pull_request'
      continue-on-error: true

    - name: Create deployment notification
      run: |
        echo "✅ Docker image built and pushed successfully!"
        echo "📦 Registry: ${{ env.REGISTRY }}"
        echo "🏷️  Image: ${{ env.IMAGE_NAME }}"
        echo "🔗 Tags: ${{ steps.meta.outputs.tags }}"
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  verify-image:
    name: Verify Pushed Image
    runs-on: ubuntu-latest
    needs: build-and-push
    if: success()

    steps:
    - name: Login to GitHub Container Registry
      uses: docker/login-action@v2
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Pull and inspect image
      run: |
        docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
        docker inspect ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

    - name: Test image (basic smoke test)
      run: |
        docker run --rm ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest python -c "print('✅ Image runs successfully')"
      continue-on-error: true

    - name: Report verification status
      run: |
        echo "✅ Docker image verification completed"
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
