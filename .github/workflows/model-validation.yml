name: Model Validation

on:
  push:
    branches: [ main ]
    paths:
      - 'src/models/**'
      - 'src/deployment/**'
      - 'models/**'
  workflow_dispatch:
  schedule:
    - cron: '0 3 * * *'  # Daily at 3 AM UTC

env:
  PYTHON_VERSION: '3.10'
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  validate-models:
    name: Validate Registered Models
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4.1.0

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip setuptools wheel
        pip install pytest pytest-asyncio
        pip install -r requirements.txt
        pip install -e .

    - name: Run model validation tests
      run: |
        python -m pytest tests/unit/test_models.py -v --tb=short
      env:
        PYTHONPATH: ${{ github.workspace }}

    - name: Verify model registry integrity
      run: |
        python -m pytest tests/unit/test_model_registry.py -v --tb=short
      env:
        PYTHONPATH: ${{ github.workspace }}

    - name: Check model artifacts exist
      run: |
        python -c "
        import os
        import json
        
        models_dir = 'models'
        if os.path.exists(models_dir):
            files = os.listdir(models_dir)
            print(f'✅ Models directory exists with {len(files)} files')
            for f in files:
                fsize = os.path.getsize(os.path.join(models_dir, f)) / 1024 / 1024
                print(f'   - {f}: {fsize:.2f} MB')
        else:
            print('⚠️ Models directory not found')
        "

  batch-prediction-test:
    name: Test Batch Prediction Pipeline
    runs-on: ubuntu-latest
    needs: validate-models
    
    steps:
    - uses: actions/checkout@v4.1.0

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip setuptools wheel
        pip install pytest pytest-asyncio
        pip install -r requirements.txt
        pip install -e .

    - name: Run batch prediction tests
      run: |
        python -m pytest tests/unit/test_batch_predictions.py -v --tb=short
      env:
        PYTHONPATH: ${{ github.workspace }}

    - name: Check predictions output
      run: |
        if [ -f "models/batch_predictions.json" ]; then
          echo "✅ Batch predictions file exists"
          wc -l models/batch_predictions.json
        else
          echo "ℹ️ Batch predictions file not yet created (will be created on Day 8 execution)"
        fi

  api-endpoint-validation:
    name: Validate API Endpoints
    runs-on: ubuntu-latest
    needs: validate-models
    
    steps:
    - uses: actions/checkout@v4.1.0

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip setuptools wheel
        pip install pytest pytest-asyncio
        pip install -r requirements.txt
        pip install -e .

    - name: Run API endpoint tests
      run: |
        python -m pytest tests/unit/test_inference_api.py -v --tb=short
      env:
        PYTHONPATH: ${{ github.workspace }}

    - name: Verify API response models
      run: |
        python -c "
        from src.deployment.inference_api import PredictionRequest, BatchPredictionRequest
        print('✅ Pydantic models loaded successfully')
        print(f'   - PredictionRequest fields: {PredictionRequest.model_fields.keys()}')
        print(f'   - BatchPredictionRequest fields: {BatchPredictionRequest.model_fields.keys()}')
        "

  model-performance:
    name: Check Model Performance
    runs-on: ubuntu-latest
    needs: validate-models
    
    steps:
    - uses: actions/checkout@v4.1.0

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-asyncio

    - name: Run model performance tests
      run: |
        pytest tests/unit/test_models.py::TestModelTraining -v --tb=short

    - name: Check evaluation metrics
      run: |
        python -c "
        import json
        import os
        
        metrics_file = 'mlops/data_quality/validation_metrics.json'
        if os.path.exists(metrics_file):
            with open(metrics_file) as f:
                metrics = json.load(f)
            print('✅ Model metrics available:')
            for key, value in metrics.items():
                if isinstance(value, (int, float)):
                    print(f'   - {key}: {value:.4f}')
        else:
            print('ℹ️ Validation metrics file not yet generated')
        "
      continue-on-error: true
