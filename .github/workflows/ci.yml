name: CI Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:
  schedule:
    - cron: '0 2 * * *'  # Daily at 2 AM UTC

env:
  PYTHON_VERSION: '3.10'
  PIP_CACHE_DIR: ~/.cache/pip
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  # Unit Tests with Coverage
  unit-tests:
    name: Unit Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10"]
    
    steps:
    - uses: actions/checkout@v4.1.0
      with:
        fetch-depth: 0

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip setuptools wheel
        pip install -r requirements.txt
        pip install pytest pytest-cov pytest-asyncio

    - name: Run unit tests with coverage
      run: |
        pytest tests/unit/ -v --cov=src --cov-report=xml --cov-report=html --tb=short

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v4
      with:
        file: ./coverage.xml
        flags: unittests
        name: codecov-umbrella
        token: ${{ secrets.GITHUB_TOKEN }}
        fail_ci_if_error: false

    - name: Archive coverage reports
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: coverage-report-${{ matrix.python-version }}
        path: htmlcov/
        retention-days: 30

  # Code Quality Checks
  code-quality:
    name: Code Quality Checks
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4.1.0

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install black isort flake8 pylint

    - name: Format check with black
      run: |
        black --check src/ tests/ pipelines/
      continue-on-error: true

    - name: Import sort check with isort
      run: |
        isort --check-only src/ tests/ pipelines/
      continue-on-error: true

    - name: Lint with flake8
      run: |
        flake8 src/ tests/ --count --select=E9,F63,F82 --show-source --statistics || true
        flake8 src/ tests/ --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
      continue-on-error: true

  # Integration & Contract Tests
  integration-tests:
    name: Integration & Contract Tests
    runs-on: ubuntu-latest
    needs: unit-tests
    
    steps:
    - uses: actions/checkout@v4.1.0

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run contract tests
      run: pytest tests/contract/ -v --tb=short
      continue-on-error: true

    - name: Run integration tests
      run: pytest tests/integration/ -v --tb=short
      continue-on-error: true

  # Security & Vulnerability Checks
  security:
    name: Security Checks
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4.1.0

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"

    - name: Install security tools
      run: |
        pip install bandit pip-audit

    - name: Run bandit security check
      run: |
        bandit -r src/ -f json -o bandit-report.json
      continue-on-error: true

    - name: Run pip-audit for vulnerabilities
      run: |
        pip-audit
      continue-on-error: true

    - name: Archive security reports
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: security-reports
        path: bandit-report.json
        retention-days: 30

  # GitHub API Status Reporting Job
  report-status:
    name: Report CI Status to GitHub
    runs-on: ubuntu-latest
    needs: [unit-tests, code-quality, integration-tests, security]
    if: always()
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4.1.0

    - name: Get workflow status
      id: status
      run: |
        if [ "${{ needs.unit-tests.result }}" == "success" ] && \
           [ "${{ needs.code-quality.result }}" == "success" ] && \
           [ "${{ needs.integration-tests.result }}" == "success" ]; then
          echo "status=✅ CI Pipeline Passed" >> $GITHUB_OUTPUT
          echo "color=green" >> $GITHUB_OUTPUT
        else
          echo "status=❌ CI Pipeline Failed" >> $GITHUB_OUTPUT
          echo "color=red" >> $GITHUB_OUTPUT
        fi

    - name: Create workflow status comment
      if: github.event_name == 'pull_request'
      uses: actions/github-script@v7.0.1.0.1
      with:
        github-token: ${{ secrets.GITHUB_TOKEN }}
        script: |
          github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: `## ${{ steps.status.outputs.status }}
          
          **Workflow Details:**
          - 🧪 Unit Tests: ${{ needs.unit-tests.result }}
          - 📝 Code Quality: ${{ needs.code-quality.result }}
          - 🔗 Integration Tests: ${{ needs.integration-tests.result }}
          - 🔒 Security Scan: ${{ needs.security.result }}
          
          [View workflow run](${context.payload.pull_request.html_url}/checks)`
          })

    - name: Report to GitHub API
      run: |
        echo "✅ CI Pipeline Status:"
        echo "   Unit Tests: ${{ needs.unit-tests.result }}"
        echo "   Code Quality: ${{ needs.code-quality.result }}"
        echo "   Integration: ${{ needs.integration-tests.result }}"
        echo "   Security: ${{ needs.security.result }}"
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  docker-build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4.1.0

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./docker/Dockerfile
        push: false
        tags: taxi-fare-prediction:latest
