version: '3.8'

services:
  # Development/Testing service with make support
  dev:
    profiles: ["dev"]
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: taxi-fare-dev
    working_dir: /app
    environment:
      - PYTHONUNBUFFERED=1
      - PYTHONDONTWRITEBYTECODE=1
    volumes:
      - ..:/app
      - ../.pytest_cache:/app/.pytest_cache
      - ../htmlcov:/app/htmlcov
      - ../mlruns:/app/mlruns
      - ../logs:/app/logs
    stdin_open: true
    tty: true
    command: /bin/bash
    networks:
      - taxi-fare-network

  # MLflow tracking server
  mlflow:
    profiles: ["dev", "api", "dashboard"]
    image: python:3.10-slim
    container_name: taxi-fare-mlflow
    working_dir: /app
    environment:
      - PYTHONUNBUFFERED=1
    command: bash -c "pip install mlflow && mlflow server --host 0.0.0.0 --port 5000"
    ports:
      - "5000:5000"
    volumes:
      - ../mlruns:/app/mlruns
    networks:
      - taxi-fare-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/"]
      interval: 30s
      timeout: 10s
      retries: 3

  # API service
  api:
    profiles: ["api"]
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: taxi-fare-api
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
    command: uvicorn deployment.api:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ../src:/app/src
      - ../data:/app/data
      - ../mlruns:/app/mlruns
    depends_on:
      mlflow:
        condition: service_healthy
    networks:
      - taxi-fare-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Dashboard service
  dashboard:
    profiles: ["dashboard"]
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: taxi-fare-dashboard
    ports:
      - "8501:8501"
    environment:
      - PYTHONUNBUFFERED=1
    command: streamlit run src/deployment/dashboard.py --server.port 8501 --server.address 0.0.0.0
    volumes:
      - ../src:/app/src
      - ../data:/app/data
      - ../mlruns:/app/mlruns
    depends_on:
      mlflow:
        condition: service_healthy
    networks:
      - taxi-fare-network

  # Monitoring services
  prometheus:
    profiles: ["monitoring"]
    image: prom/prometheus:latest
    container_name: taxi-fare-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ../docker/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
    networks:
      - taxi-fare-network

  grafana:
    profiles: ["monitoring"]
    image: grafana/grafana:latest
    container_name: taxi-fare-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - taxi-fare-network

networks:
  taxi-fare-network:
    driver: bridge

volumes:
  prometheus_data:
  grafana_data:
  mlruns: