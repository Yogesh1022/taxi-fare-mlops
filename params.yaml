# Taxi Fare Prediction - Parameters

# Data configuration
data:
  raw_path: data/raw
  processed_path: data/processed
  test_size: 0.2
  val_size: 0.1
  random_state: 42

# Feature engineering
features:
  numerical_features:
    - trip_distance
    - fare_amount
    - extra
    - mta_tax
    - tolls_amount
  temporal_features:
    - pickup_hour
    - pickup_day
    - pickup_month
    - pickup_weekday

# Model configuration
models:
  baseline:
    algorithm: LinearRegression
  xgboost:
    algorithm: XGBRegressor
    params:
      max_depth: 6
      learning_rate: 0.1
      n_estimators: 100
  lightgbm:
    algorithm: LGBMRegressor

# Training
training:
  cv_folds: 5
  random_state: 42
  n_jobs: -1

# Hyperparameter tuning
tuning:
  n_trials: 100
  timeout: 3600  # seconds
  random_state: 42

# Evaluation metrics
evaluation:
  metrics:
    - r2
    - rmse
    - mae
    - mape
