apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Production overlay extends base configuration
bases:
- ../base

namespace: taxi-fare-prod

# Production-specific label
commonLabels:
  tier: production
  version: 1.0.0

# Production replicas (high availability)
replicas:
- name: taxi-fare-api
  count: 5

# Production resource limits (higher)
patches:
- target:
    kind: Deployment
    name: taxi-fare-api
  patch: |-
    - op: replace
      path: /spec/replicas
      value: 5
    - op: replace
      path: /spec/template/spec/containers/0/resources/requests/cpu
      value: 1000m
    - op: replace
      path: /spec/template/spec/containers/0/resources/requests/memory
      value: 1Gi
    - op: replace
      path: /spec/template/spec/containers/0/resources/limits/cpu
      value: 2000m
    - op: replace
      path: /spec/template/spec/containers/0/resources/limits/memory
      value: 2Gi

# Production environment
configMapGenerator:
- name: taxi-fare-config
  behavior: merge
  literals:
  - environment=production
  - log_level=INFO
  - workers=8
  - enable_metrics=true

# Production secrets (reference your secret management system)
secretGenerator:
- name: taxi-fare-secrets
  behavior: merge
  literals:
  - environment=production
  - log_level=INFO
