apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Staging overlay extends base configuration
bases:
- ../base

namespace: taxi-fare-staging

# Staging-specific label
commonLabels:
  tier: staging
  version: 1.0.0-staging

# Staging replicas (medium)
replicas:
- name: taxi-fare-api
  count: 2

# Staging resource limits (medium)
patches:
- target:
    kind: Deployment
    name: taxi-fare-api
  patch: |-
    - op: replace
      path: /spec/replicas
      value: 2
    - op: replace
      path: /spec/template/spec/containers/0/resources/requests/cpu
      value: 500m
    - op: replace
      path: /spec/template/spec/containers/0/resources/requests/memory
      value: 512Mi
    - op: replace
      path: /spec/template/spec/containers/0/resources/limits/cpu
      value: 1000m
    - op: replace
      path: /spec/template/spec/containers/0/resources/limits/memory
      value: 1Gi

# Staging environment
configMapGenerator:
- name: taxi-fare-config
  behavior: merge
  literals:
  - environment=staging
  - log_level=DEBUG
  - workers=4
  - enable_metrics=true

# Staging image (can use staging tag)
images:
- name: taxi-fare-ml
  newTag: "staging"
