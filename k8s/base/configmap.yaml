apiVersion: v1
kind: ConfigMap
metadata:
  name: taxi-fare-config
  namespace: taxi-fare-prod
  labels:
    app: taxi-fare-api
data:
  environment: "production"
  log_level: "INFO"
  workers: "4"
  
  # API Configuration
  api_host: "0.0.0.0"
  api_port: "8000"
  api_reload: "false"
  
  # MLflow Configuration
  mlflow_uri: "http://mlflow-service:5000"
  mlflow_backend_store: "postgresql://mlflow:mlflow@postgres:5432/mlflow"
  mlflow_artifact_root: "/mlflow/artifacts"
  
  # Model Configuration
  model_path: "/app/models/best_model.pkl"
  model_version: "v1.0.0"
  
  # Feature Configuration
  feature_store_path: "/app/models/feature_store"
  
  # Monitoring
  enable_metrics: "true"
  metrics_port: "8001"
  
  # Application Configuration
  app_config.yaml: |
    api:
      title: "Taxi Fare Prediction API"
      description: "Production API for taxi fare prediction using ML models"
      version: "1.0.0"
    
    model:
      name: "taxi-fare-model"
      type: "lightgbm"
      version: "1.0.0"
    
    features:
      n_features: 12
      feature_names: "distance,hour,day_of_week,month,passenger_count,vendor_id,pickup_zone,dropoff_zone,rush_hour,weather,traffic,holiday"
    
    performance:
      r2_score: 0.8588
      rmse: 4.5
      mae: 3.2
    
    inference:
      batch_size: 32
      timeout: 30
      max_retries: 3
  
  # Logging Configuration
  logging_config.yaml: |
    version: 1
    disable_existing_loggers: false
    
    formatters:
      standard:
        format: "%(asctime)s [%(levelname)s] %(name)s: %(message)s"
      detailed:
        format: "%(asctime)s [%(levelname)s] %(name)s:%(lineno)d: %(message)s"
    
    handlers:
      console:
        class: logging.StreamHandler
        level: INFO
        formatter: standard
        stream: ext://sys.stdout
      
      file:
        class: logging.handlers.RotatingFileHandler
        level: DEBUG
        formatter: detailed
        filename: /app/logs/app.log
        maxBytes: 10485760
        backupCount: 5
    
    loggers:
      uvicorn:
        handlers: [console, file]
        level: INFO
      gunicorn:
        handlers: [console, file]
        level: INFO
    
    root:
      level: DEBUG
      handlers: [console, file]

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-config
  namespace: taxi-fare-prod
data:
  nginx.conf: |
    events {
      worker_connections 1024;
    }
    
    http {
      upstream taxi_fare_api {
        least_conn;
        server taxi-fare-api:8000 max_fails=3 fail_timeout=30s;
      }
      
      server {
        listen 80;
        server_name _;
        client_max_body_size 10M;
        
        location / {
          proxy_pass http://taxi_fare_api;
          proxy_http_version 1.1;
          proxy_set_header Upgrade $http_upgrade;
          proxy_set_header Connection "upgrade";
          proxy_set_header Host $host;
          proxy_set_header X-Real-IP $remote_addr;
          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
          proxy_set_header X-Forwarded-Proto $scheme;
          
          proxy_connect_timeout 60s;
          proxy_send_timeout 60s;
          proxy_read_timeout 60s;
        }
        
        location /health {
          proxy_pass http://taxi_fare_api/health;
          access_log off;
        }
      }
    }
