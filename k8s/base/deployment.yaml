apiVersion: apps/v1
kind: Deployment
metadata:
  name: taxi-fare-api
  namespace: taxi-fare-prod
  labels:
    app: taxi-fare-api
    version: v1
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: taxi-fare-api
      version: v1
  template:
    metadata:
      labels:
        app: taxi-fare-api
        version: v1
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      # Service account
      serviceAccountName: taxi-fare-api
      
      # Security context
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      
      # Pod anti-affinity for high availability
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - taxi-fare-api
              topologyKey: kubernetes.io/hostname
      
      # Init containers
      initContainers:
      - name: wait-for-mlflow
        image: busybox:1.28
        command: ['sh', '-c', 'until wget --quiet --tries=1 --spider http://mlflow-service:5000; do echo waiting for mlflow; sleep 1; done']
      
      # Main containers
      containers:
      - name: taxi-fare-api
        image: taxi-fare-ml:latest
        imagePullPolicy: Always
        
        # Port
        ports:
        - name: http
          containerPort: 8000
          protocol: TCP
        - name: metrics
          containerPort: 8001
          protocol: TCP
        
        # Environment variables
        env:
        - name: ENVIRONMENT
          valueFrom:
            configMapKeyRef:
              name: taxi-fare-config
              key: environment
        - name: LOG_LEVEL
          valueFrom:
            configMapKeyRef:
              name: taxi-fare-config
              key: log_level
        - name: MLFLOW_TRACKING_URI
          valueFrom:
            configMapKeyRef:
              name: taxi-fare-config
              key: mlflow_uri
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: taxi-fare-secrets
              key: database_url
        - name: API_KEY
          valueFrom:
            secretKeyRef:
              name: taxi-fare-secrets
              key: api_key
        - name: WORKERS
          valueFrom:
            configMapKeyRef:
              name: taxi-fare-config
              key: workers
        
        # Resource limits
        resources:
          requests:
            cpu: 500m
            memory: 512Mi
          limits:
            cpu: 1000m
            memory: 1Gi
        
        # Health checks
        livenessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        
        readinessProbe:
          httpGet:
            path: /ready
            port: http
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 2
        
        # Volume mounts
        volumeMounts:
        - name: models-volume
          mountPath: /app/models
          readOnly: true
        - name: logs-volume
          mountPath: /app/logs
        - name: config-volume
          mountPath: /app/config
          readOnly: true
        
        # Security context
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
            - ALL
            add:
            - NET_BIND_SERVICE
      
      # Volumes
      volumes:
      - name: models-volume
        persistentVolumeClaim:
          claimName: taxi-fare-models-pvc
      - name: logs-volume
        emptyDir: {}
      - name: config-volume
        configMap:
          name: taxi-fare-config
          defaultMode: 0644
      
      # Termination grace period
      terminationGracePeriodSeconds: 30

---
# MLFlow Service Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mlflow-service
  namespace: taxi-fare-prod
  labels:
    app: mlflow-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mlflow-service
  template:
    metadata:
      labels:
        app: mlflow-service
    spec:
      serviceAccountName: mlflow-service
      
      containers:
      - name: mlflow
        image: ghcr.io/mlflow/mlflow:v2.7.0
        ports:
        - name: mlflow
          containerPort: 5000
        
        env:
        - name: BACKEND_STORE_URI
          valueFrom:
            configMapKeyRef:
              name: taxi-fare-config
              key: mlflow_backend_store
        - name: DEFAULT_ARTIFACT_ROOT
          valueFrom:
            configMapKeyRef:
              name: taxi-fare-config
              key: mlflow_artifact_root
        
        resources:
          requests:
            cpu: 250m
            memory: 512Mi
          limits:
            cpu: 500m
            memory: 1Gi
        
        livenessProbe:
          httpGet:
            path: /
            port: mlflow
          initialDelaySeconds: 30
          periodSeconds: 10
        
        readinessProbe:
          httpGet:
            path: /
            port: mlflow
          initialDelaySeconds: 10
          periodSeconds: 5
        
        volumeMounts:
        - name: mlflow-volume
          mountPath: /mlflow
      
      volumes:
      - name: mlflow-volume
        persistentVolumeClaim:
          claimName: mlflow-pvc
