apiVersion: v1
kind: ServiceAccount
metadata:
  name: taxi-fare-api
  namespace: taxi-fare-prod
  labels:
    app: taxi-fare-api

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: mlflow-service
  namespace: taxi-fare-prod
  labels:
    app: mlflow-service

---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: taxi-fare-api-role
  namespace: taxi-fare-prod
rules:
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get", "list", "watch"]
- apiGroups: [""]
  resources: ["pods/log"]
  verbs: ["get"]
- apiGroups: [""]
  resources: ["configmaps"]
  verbs: ["get", "list"]
- apiGroups: [""]
  resources: ["secrets"]
  verbs: ["get"]
- apiGroups: [""]
  resources: ["events"]
  verbs: ["create", "patch"]
- apiGroups: ["batch"]
  resources: ["jobs"]
  verbs: ["get", "list", "watch"]
- apiGroups: ["apps"]
  resources: ["deployments"]
  verbs: ["get", "list", "watch"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: taxi-fare-api-rolebinding
  namespace: taxi-fare-prod
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: taxi-fare-api-role
subjects:
- kind: ServiceAccount
  name: taxi-fare-api
  namespace: taxi-fare-prod

---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: mlflow-service-role
  namespace: taxi-fare-prod
rules:
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get", "list"]
- apiGroups: [""]
  resources: ["persistentvolumes"]
  verbs: ["get", "list"]
- apiGroups: [""]
  resources: ["secrets"]
  verbs: ["get"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: mlflow-service-rolebinding
  namespace: taxi-fare-prod
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: mlflow-service-role
subjects:
- kind: ServiceAccount
  name: mlflow-service
  namespace: taxi-fare-prod
